<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Road Trip Planner 🚗</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f4f0;
      color: #1a202c;
      min-height: 100vh;
    }

    /* ── HERO ── */
    .hero {
      background: linear-gradient(135deg, #1b4332, #52b788);
      color: white;
      padding: 50px 20px 40px;
      text-align: center;
    }
    .hero h1 { font-size: 2.4rem; margin-bottom: 8px; }
    .hero p  { font-size: 1.1rem; opacity: 0.88; }

    /* ── FORM ── */
    .form-wrap {
      max-width: 680px;
      margin: -28px auto 40px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.12);
      padding: 32px;
    }
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group.full { grid-column: 1 / -1; }
    label { font-size: 0.82rem; font-weight: 600; color: #4a5568; text-transform: uppercase; letter-spacing: 0.05em; }
    input, textarea {
      border: 1.5px solid #e2e8f0;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.97rem;
      font-family: inherit;
      transition: border-color 0.2s;
      resize: none;
      color: #1a202c;
    }
    input:focus, textarea:focus { outline: none; border-color: #52b788; }
    input::placeholder, textarea::placeholder { color: #a0aec0; }

    .btn {
      grid-column: 1 / -1;
      background: linear-gradient(135deg, #1b4332, #52b788);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 14px;
      font-size: 1.05rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
    }
    .btn:hover  { opacity: 0.92; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    /* ── SPINNER ── */
    #loader {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      padding: 40px 0;
      color: #2d6a4f;
      font-weight: 600;
    }
    .spinner {
      width: 44px; height: 44px;
      border: 4px solid #d1fae5;
      border-top-color: #52b788;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── ERROR ── */
    #error-box {
      display: none;
      max-width: 680px;
      margin: 0 auto 24px;
      background: #fff5f5;
      border-left: 4px solid #fc8181;
      border-radius: 8px;
      padding: 14px 18px;
      color: #c53030;
      font-size: 0.95rem;
    }

    /* ── ROUTES ── */
    #results { max-width: 900px; margin: 0 auto 60px; padding: 0 20px; }
    #results h2 { font-size: 1.4rem; margin-bottom: 20px; color: #1b4332; }

    .route-card {
      background: white;
      border-radius: 14px;
      box-shadow: 0 3px 12px rgba(0,0,0,0.08);
      margin-bottom: 20px;
      overflow: hidden;
      transition: box-shadow 0.2s;
    }
    .route-card:hover { box-shadow: 0 6px 20px rgba(0,0,0,0.13); }

    .route-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 22px 24px;
      cursor: pointer;
      user-select: none;
    }
    .route-header-left h3 { font-size: 1.15rem; color: #1b4332; }
    .route-header-left p  { font-size: 0.88rem; color: #718096; margin-top: 3px; }
    .route-badges {
      display: flex;
      gap: 10px;
      margin-top: 10px;
      flex-wrap: wrap;
    }
    .badge {
      background: #e6f4ed;
      color: #276749;
      font-size: 0.78rem;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 20px;
    }
    .chevron {
      font-size: 1.1rem;
      color: #a0aec0;
      transition: transform 0.25s;
      flex-shrink: 0;
      margin-left: 16px;
    }
    .route-card.open .chevron { transform: rotate(180deg); }

    /* ── ROUTE BODY ── */
    .route-body {
      display: none;
      padding: 0 24px 24px;
      border-top: 1px solid #e2e8f0;
    }
    .route-card.open .route-body { display: block; }

    .highlight-box {
      background: #fffbea;
      border-left: 4px solid #f6ad55;
      border-radius: 8px;
      padding: 12px 16px;
      margin: 18px 0;
      font-size: 0.92rem;
      color: #744210;
    }
    .highlight-box strong { color: #c05621; }

    .stops-title { font-size: 0.95rem; font-weight: 700; color: #2d3748; margin-bottom: 12px; }

    .stop {
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      margin-bottom: 10px;
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .stop:hover { border-color: #52b788; }
    .stop.open  { border-color: #52b788; }

    .stop-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 13px 16px;
    }
    .stop-icon { font-size: 1.3rem; flex-shrink: 0; }
    .stop-info { flex: 1; }
    .stop-name    { font-weight: 600; font-size: 0.97rem; }
    .stop-address { font-size: 0.83rem; color: #718096; margin-top: 2px; }
    .stop-label   { font-size: 0.72rem; color: #52b788; font-weight: 700; text-transform: uppercase; margin-top: 3px; }
    .stop-chevron { font-size: 0.7rem; color: #a0aec0; transition: transform 0.2s; flex-shrink: 0; }
    .stop.open .stop-chevron { transform: rotate(180deg); }

    .stop-desc {
      display: none;
      padding: 0 16px 14px 16px;
      font-size: 0.9rem;
      color: #4a5568;
      line-height: 1.65;
      border-top: 1px solid #e2e8f0;
      padding-top: 12px;
      margin: 0 16px;
    }
    .stop.open .stop-desc { display: block; }

    .maps-btn {
      display: inline-block;
      margin-top: 18px;
      background: linear-gradient(135deg, #1b4332, #52b788);
      color: white;
      padding: 12px 24px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.95rem;
      transition: opacity 0.2s;
    }
    .maps-btn:hover { opacity: 0.88; }
    .maps-link { display: block; text-align: center; margin-top: 10px; font-size: 0.85rem; color: #52b788; text-decoration: none; }
    .maps-link:hover { text-decoration: underline; }

    @media (max-width: 600px) {
      .form-grid { grid-template-columns: 1fr; }
      .hero h1 { font-size: 1.8rem; }
    }
  </style>
</head>
<body>

  <div class="hero">
    <h1>🚗 Road Trip Planner</h1>
    <p>Tell us where you are and we'll plan the perfect route</p>
  </div>

  <div class="form-wrap">
    <form id="trip-form">
      <div class="form-grid">

        <input type="hidden" id="api_key" value="" />

        <div class="form-group full">
          <label>Starting Location *</label>
          <input type="text" id="location" placeholder="e.g. Denver, Colorado" required />
        </div>

        <div class="form-group">
          <label>Specific Destination</label>
          <input type="text" id="destination" placeholder="e.g. Grand Canyon" />
        </div>

        <div class="form-group">
          <label>Time on the Road</label>
          <input type="text" id="duration" placeholder="e.g. weekend, 1 week" />
        </div>

        <div class="form-group full">
          <label>Preferences</label>
          <input type="text" id="preferences" placeholder="e.g. mountains, beaches, history, food" />
        </div>

        <div class="form-group full">
          <label>Anything else we should know?</label>
          <textarea id="extra_info" rows="2" placeholder="e.g. travelling with kids, avoid highways, budget trip"></textarea>
        </div>

        <button class="btn" type="submit">✨ Plan My Road Trip</button>
      </div>
    </form>
  </div>

  <div id="loader">
    <div class="spinner"></div>
    <span>Planning your road trips…</span>
  </div>

  <div id="error-box"></div>

  <div id="results"></div>

  <script>
    const form       = document.getElementById('trip-form');
    const loader     = document.getElementById('loader');
    const errorBox   = document.getElementById('error-box');
    const resultsDiv = document.getElementById('results');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      // Reset UI
      errorBox.style.display = 'none';
      resultsDiv.innerHTML = '';
      loader.style.display = 'flex';
      form.querySelector('.btn').disabled = true;

      const payload = {
        api_key:     document.getElementById('api_key').value.trim(),
        location:    document.getElementById('location').value.trim(),
        destination: document.getElementById('destination').value.trim(),
        duration:    document.getElementById('duration').value.trim(),
        preferences: document.getElementById('preferences').value.trim(),
        extra_info:  document.getElementById('extra_info').value.trim(),
      };

      try {
        const res  = await fetch('/recommend', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.error || 'Something went wrong.');
        }

        renderRoutes(data.routes, data.session_id, payload);

      } catch (err) {
        errorBox.textContent = '❌ ' + err.message;
        errorBox.style.display = 'block';
      } finally {
        loader.style.display = 'none';
        form.querySelector('.btn').disabled = false;
      }
    });

    function renderRoutes(routes, sessionId, payload) {
      resultsDiv.innerHTML = `<h2>🗺️ Your Road Trip Options</h2>`;

      routes.forEach((route, i) => {
        const card = document.createElement('div');
        card.className = 'route-card';

        // Build stops HTML
        let stopsHtml = '';
        route.stops.forEach((stop, j) => {
          const isEndpoint = j === 0 || j === route.stops.length - 1;
          const icon  = isEndpoint ? '🏁' : '📌';
          const label = j === 0 ? 'Start / End' : isEndpoint ? 'Return' : `Stop ${j}`;
          stopsHtml += `
            <div class="stop" onclick="toggleStop(this)">
              <div class="stop-header">
                <div class="stop-icon">${icon}</div>
                <div class="stop-info">
                  <div class="stop-name">${stop.name}</div>
                  <div class="stop-address">${stop.address}</div>
                  <div class="stop-label">${label}</div>
                </div>
                <div class="stop-chevron">▼</div>
              </div>
              <div class="stop-desc">${stop.description || ''}</div>
            </div>`;
        });

        // Check for avoid warnings
        const avoidWords = ['highway','highways','motorway','toll','tolls','freeway'];
        const combined   = (payload.preferences + ' ' + payload.extra_info).toLowerCase();
        const avoidTip   = avoidWords.some(w => combined.includes(w))
          ? `<p style="margin-top:12px;font-size:0.85rem;color:#744210;background:#fffbea;padding:10px 14px;border-radius:8px;">
               ⚠️ To avoid highways/tolls: in Google Maps click ⋮ → Route options after it opens.
             </p>`
          : '';

        card.innerHTML = `
          <div class="route-header" onclick="toggleCard(this.parentElement)">
            <div class="route-header-left">
              <h3>Route ${i + 1}: ${route.name}</h3>
              <p>${route.theme}</p>
              <div class="route-badges">
                <span class="badge">📏 ${route.distance}</span>
                <span class="badge">🕐 ${route.drive_time}</span>
                <span class="badge">📅 ${route.best_time}</span>
              </div>
            </div>
            <div class="chevron">▼</div>
          </div>
          <div class="route-body">
            <div class="highlight-box"><strong>⭐ Don't Miss:</strong> ${route.highlight}</div>
            <div class="stops-title">📍 Stops</div>
            ${stopsHtml}
            <a class="maps-btn" href="/map/${sessionId}/${i}" target="_blank">🗺️ View Route on Map</a>
            <a class="maps-link" href="${route.maps_url}" target="_blank">Open directly in Google Maps ↗</a>
            ${avoidTip}
          </div>`;

        resultsDiv.appendChild(card);
      });
    }

    function toggleCard(card) {
      card.classList.toggle('open');
    }

    function toggleStop(stop) {
      stop.classList.toggle('open');
    }
  </script>
</body>
</html>
