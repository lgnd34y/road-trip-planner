<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Route Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #fafafa; --surface: #ffffff; --border: #e4e4e7; --border-hover: #d4d4d8;
      --text: #09090b; --muted: #71717a; --subtle: #a1a1aa;
      --primary: #18181b; --primary-fg: #fafafa;
      --brand: #16a34a; --brand-bg: #f0fdf4; --brand-border: #bbf7d0;
      --radius: 8px;
    }

    body { display: flex; height: 100vh; overflow: hidden; font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; -webkit-font-smoothing: antialiased; }

    .sidebar { width: 340px; min-width: 340px; height: 100vh; overflow-y: auto; background: var(--surface); border-right: 1px solid var(--border); z-index: 100; display: flex; flex-direction: column; }
    .sidebar-header { background: var(--primary); color: var(--primary-fg); padding: 20px; flex-shrink: 0; }
    .back-link { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; color: rgba(255,255,255,0.65); text-decoration: none; margin-bottom: 10px; transition: color 0.15s; }
    .back-link:hover { color: rgba(255,255,255,0.9); }
    .sidebar-header h2 { font-size: 15px; font-weight: 600; letter-spacing: -0.01em; line-height: 1.3; }
    .sidebar-header p  { font-size: 13px; opacity: 0.65; margin-top: 3px; }
    .badges { display: flex; flex-wrap: wrap; gap: 6px; padding: 12px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .badge { background: var(--bg); border: 1px solid var(--border); color: var(--muted); font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 99px; }
    .highlight { margin: 12px 16px; padding: 10px 13px; background: #fffbeb; border: 1px solid #fde68a; border-radius: var(--radius); font-size: 13px; color: #92400e; line-height: 1.5; flex-shrink: 0; }
    .highlight strong { font-weight: 600; }
    .stops-title { padding: 10px 16px 5px; font-size: 11px; font-weight: 600; color: var(--subtle); text-transform: uppercase; letter-spacing: 0.06em; flex-shrink: 0; }
    .stops-list { flex: 1; }
    .stop { border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.15s; }
    .stop:hover  { background: var(--bg); }
    .stop.active { background: var(--bg); }
    .stop-row { display: flex; align-items: center; gap: 10px; padding: 11px 16px; }
    .stop-num { width: 26px; height: 26px; border-radius: 50%; background: var(--brand); color: white; font-size: 11px; font-weight: 600; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .stop-num.endpoint { background: var(--primary); }
    .stop-info { flex: 1; min-width: 0; }
    .stop-name  { font-weight: 500; font-size: 13px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .stop-addr  { font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }
    .stop-label { font-size: 11px; color: var(--brand); font-weight: 600; margin-top: 1px; text-transform: uppercase; letter-spacing: 0.04em; }
    .stop-chev  { font-size: 10px; color: var(--subtle); transition: transform 0.2s; flex-shrink: 0; }
    .stop.open .stop-chev { transform: rotate(180deg); }
    .stop-desc   { display: none; padding: 0 16px 12px; font-size: 13px; color: var(--muted); line-height: 1.6; border-top: 1px solid var(--border); padding-top: 10px; }
    .stop.open .stop-desc { display: block; }
    .stop-extras { display: none; padding: 0 16px 12px; border-top: 1px solid var(--border); }
    .stop.open .stop-extras { display: block; }
    .extras-label { font-size: 11px; font-weight: 600; color: var(--subtle); text-transform: uppercase; letter-spacing: 0.06em; margin: 10px 0 5px; }
    .hotel-card  { background: var(--brand-bg); border: 1px solid var(--brand-border); border-radius: 6px; padding: 8px 10px; font-size: 13px; }
    .hotel-name  { font-weight: 600; color: #15803d; font-size: 13px; }
    .hotel-addr  { color: var(--muted); font-size: 12px; margin-top: 1px; }
    .hotel-notes { color: var(--muted); font-size: 12px; margin-top: 2px; }
    .hotel-book-btn { display: inline-block; margin-top: 6px; background: var(--surface); border: 1px solid var(--border); color: var(--muted); font-size: 12px; font-weight: 500; padding: 3px 9px; border-radius: 5px; text-decoration: none; }
    .hotel-book-btn:hover { border-color: var(--border-hover); color: var(--text); }
    .restaurant-list { display: flex; flex-direction: column; gap: 4px; }
    .restaurant-card { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 7px 10px; font-size: 13px; }
    .restaurant-name { font-weight: 500; color: var(--text); font-size: 13px; }
    .restaurant-cuisine { background: var(--border); color: var(--muted); font-size: 11px; padding: 1px 5px; border-radius: 3px; margin-left: 4px; }
    .restaurant-notes { color: var(--muted); font-size: 12px; margin-top: 1px; }
    .attractions-list { display: flex; flex-direction: column; gap: 4px; }
    .attraction-item { display: flex; gap: 6px; align-items: baseline; font-size: 13px; }
    .attraction-dot  { color: var(--brand); font-size: 9px; flex-shrink: 0; line-height: 1.8; }
    .attraction-name { font-weight: 500; color: var(--text); }
    .attraction-note { color: var(--muted); font-size: 12px; }
    .flights-section { padding: 10px 16px; border-top: 1px solid var(--border); flex-shrink: 0; }
    .flights-title { font-size: 11px; font-weight: 600; color: var(--subtle); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 7px; }
    .flight-item { background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 6px; padding: 8px 11px; margin-bottom: 5px; }
    .flight-item-route { font-weight: 600; color: #1d4ed8; font-size: 13px; }
    .flight-item-reason { font-size: 12px; color: var(--muted); margin: 2px 0 5px; }
    .flight-search-btn { display: inline-block; background: #1d4ed8; color: white; font-size: 12px; font-weight: 500; padding: 4px 9px; border-radius: 5px; text-decoration: none; }
    .flight-search-btn:hover { background: #1e40af; }
    .sidebar-footer { padding: 13px 16px; border-top: 1px solid var(--border); flex-shrink: 0; }
    .maps-btn { display: block; background: var(--primary); color: var(--primary-fg); text-align: center; padding: 10px; border-radius: var(--radius); text-decoration: none; font-weight: 500; font-size: 13px; transition: background 0.15s; }
    .maps-btn:hover { background: #27272a; }

    /* ── MAP ── */
    #map { flex: 1; height: 100vh; }

    /* ── LOADING ── */
    #map-loader {
      position: fixed;
      top: 0; left: 340px; right: 0; bottom: 0;
      background: rgba(250,250,250,0.92);
      z-index: 500;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
    }
    .spinner {
      width: 28px; height: 28px;
      border: 2px solid var(--border);
      border-top-color: var(--text);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loader-text { color: var(--muted); font-size: 13px; }

    /* ── RESPONSIVE ── */
    @media (max-width: 700px) {
      body { flex-direction: column; }
      .sidebar { width: 100%; min-width: 0; height: 50vh; }
      #map { height: 50vh; }
      #map-loader { left: 0; top: 50vh; }
    }
  </style>
</head>
<body>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-header">
      <a class="back-link" href="javascript:history.back()">← Back to routes</a>
      <h2 id="route-name"></h2>
      <p  id="route-theme"></p>
    </div>

    <div class="badges"   id="badges"></div>
    <div class="highlight" id="highlight"></div>
    <div class="stops-title">📍 Stops — click to explore</div>
    <div class="stops-list" id="stops-list"></div>
    <div class="flights-section" id="flights-section" style="display:none"></div>

    <div class="sidebar-footer">
      <a id="maps-btn" class="maps-btn" href="#" target="_blank">
        🗺️ Open Full Route in Google Maps
      </a>
    </div>
  </div>

  <!-- MAP -->
  <div id="map"></div>

  <!-- LOADING OVERLAY -->
  <div id="map-loader">
    <div class="spinner"></div>
    <div id="loader-text">Locating stops on map…</div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    // Prefer hash-encoded route data (passed from main page) over server-side data
    let route;
    if (window.location.hash && window.location.hash.length > 1) {
      try {
        route = JSON.parse(decodeURIComponent(escape(atob(window.location.hash.slice(1)))));
      } catch(e) {}
    }
    if (!route) route = {{ route_json | safe }};
    if (!route) {
      document.body.innerHTML = '<p style="padding:40px;font-family:sans-serif">Route data not found. Please go back and generate routes again.</p>';
      throw new Error('No route data');
    }
    const stops  = route.stops;
    const coords = new Array(stops.length).fill(null);
    const markers = new Array(stops.length).fill(null);

    // ── Populate sidebar ──
    document.getElementById('route-name').textContent  = route.name;
    document.getElementById('route-theme').textContent = route.theme;
    document.getElementById('highlight').innerHTML =
      `<strong>⭐ Don't Miss:</strong> ${route.highlight}`;
    document.getElementById('maps-btn').href = route.maps_url;

    [['📏', route.distance], ['🕐', route.drive_time], ['📅', route.best_time]].forEach(([icon, val]) => {
      const b = document.createElement('span');
      b.className = 'badge';
      b.textContent = `${icon} ${val}`;
      document.getElementById('badges').appendChild(b);
    });

    const stopsList = document.getElementById('stops-list');
    stops.forEach((stop, j) => {
      const isEndpoint = j === 0 || j === stops.length - 1;
      const label = j === 0 ? 'Start / End' : isEndpoint ? 'Return' : `Stop ${j}`;

      const div = document.createElement('div');
      div.className = 'stop';
      div.dataset.idx = j;
      // Attractions HTML
      let attractionsHtml = '';
      if (stop.attractions && stop.attractions.length) {
        const items = stop.attractions.map(a => `
          <div class="attraction-item">
            <span class="attraction-dot">•</span>
            <span class="attraction-name">${a.name || ''}</span>
            ${a.note ? `<span class="attraction-note"> — ${a.note}</span>` : ''}
          </div>`).join('');
        attractionsHtml = `
          <div class="extras-label">🎯 Things to Do</div>
          <div class="attractions-list">${items}</div>`;
      }

      // Hotel HTML
      let hotelHtml = '';
      if (stop.hotel && stop.hotel.name && !isEndpoint) {
        const bookingQ   = encodeURIComponent(stop.hotel.name + ' ' + (stop.hotel.address || stop.address || ''));
        const bookingUrl = `https://www.booking.com/search.html?ss=${bookingQ}`;
        hotelHtml = `
          <div class="extras-label">🏨 Where to Stay</div>
          <div class="hotel-card">
            <div class="hotel-name">${stop.hotel.name}</div>
            ${stop.hotel.address ? `<div class="hotel-addr">${stop.hotel.address}</div>` : ''}
            ${stop.hotel.notes   ? `<div class="hotel-notes">${stop.hotel.notes}</div>`  : ''}
            <a class="hotel-book-btn" href="${bookingUrl}" target="_blank" rel="noopener noreferrer">🔍 Booking.com</a>
          </div>`;
      }

      // Restaurants HTML
      let restHtml = '';
      if (stop.restaurants && stop.restaurants.length) {
        const cards = stop.restaurants.map(r => `
          <div class="restaurant-card">
            <div class="restaurant-name">${r.name}<span class="restaurant-cuisine">${r.cuisine || ''}</span></div>
            ${r.notes ? `<div class="restaurant-notes">${r.notes}</div>` : ''}
          </div>`).join('');
        restHtml = `
          <div class="extras-label">🍽️ Where to Eat</div>
          <div class="restaurant-list">${cards}</div>`;
      }

      div.innerHTML = `
        <div class="stop-row" onclick="handleStopClick(${j})">
          <div class="stop-num ${isEndpoint ? 'endpoint' : ''}">${isEndpoint ? '🏁' : j}</div>
          <div class="stop-info">
            <div class="stop-name"  title="${stop.name}">${stop.name}</div>
            <div class="stop-addr"  title="${stop.address}">${stop.address}</div>
            <div class="stop-label">${label}</div>
          </div>
          <div class="stop-chev">▼</div>
        </div>
        <div class="stop-desc">${stop.description || ''}</div>
        <div class="stop-extras">${attractionsHtml}${hotelHtml}${restHtml}</div>`;
      stopsList.appendChild(div);
    });

    // ── Flights section ──
    if (route.flights && route.flights.length) {
      const sec = document.getElementById('flights-section');
      sec.style.display = 'block';
      sec.innerHTML = `<div class="flights-title">✈️ Flight Options for Long Legs</div>` +
        route.flights.map(f => `
          <div class="flight-item">
            <div class="flight-item-route">✈️ ${f.from} → ${f.to}</div>
            <div class="flight-item-reason">${f.reason}</div>
            <a class="flight-search-btn" href="${f.search_url}" target="_blank" rel="noopener noreferrer">Search Flights →</a>
          </div>`).join('');
    }

    // ── Init Leaflet map ──
    const map = L.map('map', { zoomControl: true });
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
      maxZoom: 19,
    }).addTo(map);

    // ── Marker icon factory ──
    function makeIcon(label, isEndpoint) {
      const size = isEndpoint ? 34 : 30;
      const bg   = isEndpoint ? '#1b4332' : '#52b788';
      const html = `<div style="
        width:${size}px;height:${size}px;
        background:${bg};border:2.5px solid white;border-radius:50%;
        display:flex;align-items:center;justify-content:center;
        color:white;font-weight:700;font-size:${isEndpoint ? 14 : 13}px;
        box-shadow:0 2px 8px rgba(0,0,0,0.35);
      ">${isEndpoint ? '🏁' : label}</div>`;
      return L.divIcon({ className: '', html, iconSize: [size, size], iconAnchor: [size/2, size/2] });
    }

    // ── Geocode with Nominatim ──
    async function geocode(address) {
      const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(address)}&format=json&limit=1`;
      const res  = await fetch(url, { headers: { 'User-Agent': 'RoadTripPlanner/1.0' } });
      const data = await res.json();
      if (data.length > 0) return [parseFloat(data[0].lat), parseFloat(data[0].lon)];
      return null;
    }

    // ── Draw driving route via OSRM ──
    async function drawRoute(points) {
      if (points.length < 2) return;
      try {
        const waypoints = points.map(([lat, lon]) => `${lon},${lat}`).join(';');
        const res  = await fetch(`https://router.project-osrm.org/route/v1/driving/${waypoints}?overview=full&geometries=geojson`);
        const data = await res.json();
        if (data.code === 'Ok') {
          const line = data.routes[0].geometry.coordinates.map(([lon, lat]) => [lat, lon]);
          L.polyline(line, { color: '#52b788', weight: 5, opacity: 0.85 }).addTo(map);
          return;
        }
      } catch (_) {}
      // Fallback: dashed straight lines between stops
      L.polyline(points, { color: '#52b788', weight: 3, opacity: 0.6, dashArray: '8 6' }).addTo(map);
    }

    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

    // ── Main: geocode all stops then draw ──
    async function init() {
      for (let i = 0; i < stops.length; i++) {
        document.getElementById('loader-text').textContent =
          `Locating stop ${i + 1} of ${stops.length}…`;
        try {
          const latlng = await geocode(stops[i].address);
          if (latlng) {
            coords[i] = latlng;
            const isEndpoint = i === 0 || i === stops.length - 1;
            const marker = L.marker(latlng, { icon: makeIcon(i, isEndpoint) })
              .addTo(map)
              .bindPopup(`<strong>${stops[i].name}</strong><br><span style="font-size:0.85rem;color:#555">${stops[i].address}</span>`);
            markers[i] = marker;
          }
        } catch (e) { console.warn('Geocode failed:', stops[i].address, e); }
        if (i < stops.length - 1) await sleep(350); // Nominatim rate limit
      }

      // Start and end are the same location — share coords if one geocoded and the other didn't
      const last = coords.length - 1;
      if (!coords[0] && coords[last]) coords[0] = coords[last];
      if (coords[0] && !coords[last]) coords[last] = coords[0];

      const valid = coords.filter(Boolean);
      if (valid.length > 0) {
        map.fitBounds(L.latLngBounds(valid), { padding: [50, 50] });
      }

      await drawRoute(valid);
      document.getElementById('map-loader').style.display = 'none';
    }

    // ── Stop click: expand desc + pan map ──
    function handleStopClick(idx) {
      const el = document.querySelector(`.stop[data-idx="${idx}"]`);
      const wasOpen = el.classList.contains('open');

      // Collapse all
      document.querySelectorAll('.stop').forEach(s => s.classList.remove('open', 'active'));

      if (!wasOpen) {
        el.classList.add('open', 'active');
        if (coords[idx]) {
          map.setView(coords[idx], 13, { animate: true });
          if (markers[idx]) markers[idx].openPopup();
        }
      }
    }

    init();
  </script>
</body>
</html>
